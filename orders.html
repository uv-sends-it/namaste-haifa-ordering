<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders – Namaste Haifa</title>
  <link rel="icon" type="image/jpeg" href="1707323833phpcHbMD1.jpg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    #pin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }

    #pin-screen h2 { font-size: 1.4rem; color: #c0392b; }
    #pin-screen p { color: #888; font-size: 0.9rem; }

    #pin-input {
      font-size: 1.5rem;
      letter-spacing: 0.5rem;
      text-align: center;
      width: 160px;
      padding: 12px;
      border: 2px solid #c0392b;
      border-radius: 10px;
      background: white;
      color: #1a1a1a;
    }

    #pin-submit {
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    #pin-error { color: #e74c3c; font-size: 0.9rem; display: none; }
    #main { display: none; }

    header {
      background: linear-gradient(135deg, #c0392b, #e67e22);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.2rem; }

    .live-dot {
      width: 10px; height: 10px;
      background: #2ecc71;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* TABS */
    .tab-bar {
      background: white;
      display: flex;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: white;
      font-size: 0.9rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }

    .tab-btn.active {
      color: #c0392b;
      border-bottom-color: #c0392b;
    }

    /* FILTER BAR */
    .filter-bar {
      background: white;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #c0392b;
      background: white;
      color: #c0392b;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }

    .filter-btn.active { background: #c0392b; color: white; }

    #orders-container, #paid-container { padding: 16px; }

    .table-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .table-header {
      background: linear-gradient(135deg, #c0392b, #e67e22);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .paid-header {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
    }

    .table-title { font-size: 1.1rem; font-weight: 700; }
    .table-status { font-size: 0.8rem; opacity: 0.85; }

    .order-block { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    .order-block:last-child { border-bottom: none; }

    .order-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .order-num { font-size: 0.8rem; color: #888; }

    .order-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .badge-new { background: #fde8e8; color: #c0392b; }
    .badge-done { background: #e8fde8; color: #27ae60; }

    .bill-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      padding: 3px 0;
      color: #444;
    }

    .bill-item-name { flex: 1; }
    .bill-item-qty { color: #888; margin-right: 8px; }
    .bill-item-price { font-weight: 500; }

    .order-notes-line {
      font-size: 0.8rem;
      color: #e67e22;
      font-style: italic;
      margin-top: 6px;
    }

    .table-total {
      background: #fff8f0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 2px solid #f0c080;
    }

    .paid-total {
      background: #f0fdf4;
      border-top-color: #a7f3c8;
    }

    .total-label { font-weight: 700; font-size: 0.95rem; color: #555; }
    .total-amount { font-weight: 700; font-size: 1.2rem; color: #c0392b; }
    .paid-total .total-amount { color: #27ae60; }

    .print-btn {
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .clear-btn {
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .table-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
    }

    .paid-time {
      font-size: 0.78rem;
      color: white;
      font-weight: 600;
      opacity: 0.9;
    }

    #empty-msg, #empty-paid-msg {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 1rem;
    }

    @media print {
      .print-btn, .clear-btn, .filter-bar, .tab-bar, header, .table-actions { display: none !important; }
      .table-card { box-shadow: none; border: 1px solid #ccc; }
      body { background: white; }
    }
  </style>
</head>
<body>

<div id="pin-screen">
  <h2>🧾 Front Staff – Orders</h2>
  <p>Enter staff PIN to continue</p>
  <input type="password" id="pin-input" maxlength="6" placeholder="••••" inputmode="numeric">
  <div id="pin-error">Incorrect PIN</div>
  <button id="pin-submit" onclick="checkPin()">Enter</button>
</div>

<div id="main">
  <header>
    <h1>🧾 Orders</h1>
    <div>
      <span class="live-dot"></span>
      <span style="font-size:0.85rem;opacity:0.9;">Live</span>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">Active Orders</button>
    <button class="tab-btn" id="tab-paid" onclick="switchTab('paid')">Paid History</button>
  </div>

  <!-- ACTIVE ORDERS TAB -->
  <div id="active-tab">
    <div class="filter-bar">
      <strong style="font-size:0.85rem;color:#666;">Show:</strong>
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All Tables</button>
      <button class="filter-btn" id="filter-ready" onclick="setFilter('ready')">Kitchen Done Only</button>
    </div>
    <div id="orders-container">
      <div id="empty-msg">No active orders</div>
    </div>
  </div>

  <!-- PAID HISTORY TAB -->
  <div id="paid-tab" style="display:none">
    <div class="filter-bar">
      <strong style="font-size:0.85rem;color:#666;">Period:</strong>
      <button class="filter-btn active" id="paid-filter-today" onclick="setPaidFilter('today')">Today</button>
      <button class="filter-btn" id="paid-filter-week" onclick="setPaidFilter('week')">This Week</button>
      <button class="filter-btn" id="paid-filter-all" onclick="setPaidFilter('all')">All Time</button>
      <button class="filter-btn" id="clear-old-btn" onclick="clearOldOrders()" style="margin-left:auto;border-color:#e74c3c;color:#e74c3c;">🗑 Clear Old</button>
    </div>
    <div id="paid-container">
      <div id="empty-paid-msg">No paid orders yet</div>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getDatabase(app);

  window.clearOldOrders = async () => {
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, async (snap) => {
      const data = snap.val() || {};
      const toDelete = Object.entries(data).filter(([, o]) => {
        const ts = o.paidAt || (typeof o.timestamp === 'number' ? o.timestamp : 0);
        return o.status === 'cleared' && ts < cutoff;
      });
      if (toDelete.length === 0) {
        alert('No orders older than 30 days to delete.');
        return;
      }
      if (!confirm(`Delete ${toDelete.length} paid order${toDelete.length > 1 ? 's' : ''} older than 30 days? This cannot be undone.`)) return;
      await Promise.all(toDelete.map(([id]) => remove(ref(db, 'orders/' + id))));
      alert(`Deleted ${toDelete.length} old order${toDelete.length > 1 ? 's' : ''}.`);
    }, { onlyOnce: true });
  };

  window._clearTable = async (tableNum) => {
    if (!confirm(`Mark Table ${tableNum} as paid and clear?`)) return;
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, async (snap) => {
      const data = snap.val() || {};
      const promises = Object.entries(data)
        .filter(([, order]) => String(order.table) === String(tableNum) && order.status !== 'cleared')
        .map(([id]) => update(ref(db, 'orders/' + id), { status: 'cleared', paidAt: Date.now() }));
      await Promise.all(promises);
    }, { onlyOnce: true });
  };

  function checkPin() {
    const pin = document.getElementById('pin-input').value;
    if (pin === STAFF_PIN) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      startListening();
    } else {
      document.getElementById('pin-error').style.display = 'block';
      document.getElementById('pin-input').value = '';
    }
  }
  window.checkPin = checkPin;

  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPin();
  });

  let currentFilter = 'all';
  let currentPaidFilter = 'today';
  let currentTab = 'active';

  window.switchTab = (tab) => {
    currentTab = tab;
    document.getElementById('active-tab').style.display = tab === 'active' ? 'block' : 'none';
    document.getElementById('paid-tab').style.display = tab === 'paid' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (window._lastData) {
      if (tab === 'active') renderActive(window._lastData);
      else renderPaid(window._lastData);
    }
  };

  window.setFilter = (f) => {
    currentFilter = f;
    document.querySelectorAll('#active-tab .filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-' + f).classList.add('active');
    if (window._lastData) renderActive(window._lastData);
  };

  window.setPaidFilter = (f) => {
    currentPaidFilter = f;
    document.querySelectorAll('#paid-tab .filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('paid-filter-' + f).classList.add('active');
    if (window._lastData) renderPaid(window._lastData);
  };

  function startListening() {
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, (snapshot) => {
      const data = snapshot.val() || {};
      window._lastData = data;
      if (currentTab === 'active') renderActive(data);
      else renderPaid(data);
    });
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) + ' ' +
      d.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  }

  function startOfDay() {
    const d = new Date(); d.setHours(0,0,0,0); return d.getTime();
  }

  function startOfWeek() {
    const d = new Date(); d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay()); return d.getTime();
  }

  function renderActive(data) {
    const container = document.getElementById('orders-container');
    const byTable = {};

    Object.entries(data).forEach(([id, order]) => {
      if (order.status === 'cleared') return;
      if (currentFilter === 'ready' && order.status !== 'done') return;
      const t = String(order.table);
      if (!byTable[t]) byTable[t] = [];
      byTable[t].push({ id, ...order });
    });

    const tables = Object.keys(byTable).sort((a, b) => Number(a) - Number(b));

    if (tables.length === 0) {
      container.innerHTML = '<div id="empty-msg">No active orders</div>';
      return;
    }

    container.innerHTML = '';

    tables.forEach(tableNum => {
      const orders = byTable[tableNum].sort((a, b) => {
        return (typeof a.timestamp === 'number' ? a.timestamp : 0) -
               (typeof b.timestamp === 'number' ? b.timestamp : 0);
      });

      const hasNew = orders.some(o => o.status === 'new');
      const tableTotal = orders.reduce((s, o) => s + (o.total || 0), 0);

      const card = document.createElement('div');
      card.className = 'table-card';

      const ordersHtml = orders.map(order => {
        const ts = typeof order.timestamp === 'number' ? order.timestamp : null;
        const shortId = order.id.slice(-6).toUpperCase();
        const itemsHtml = (order.items || []).map(item => `
          <div class="bill-item">
            <span class="bill-item-name">${item.name}</span>
            <span class="bill-item-qty">×${item.qty}</span>
            <span class="bill-item-price">$${(item.price * item.qty).toFixed(2)}</span>
          </div>
        `).join('');
        return `
          <div class="order-block">
            <div class="order-meta">
              <span class="order-num">#${shortId} · ${ts ? timeAgo(ts) : ''}</span>
              <span class="order-badge ${order.status === 'done' ? 'badge-done' : 'badge-new'}">${order.status === 'done' ? 'Kitchen Done' : 'Preparing'}</span>
            </div>
            ${itemsHtml}
            ${order.notes ? `<div class="order-notes-line">📝 ${order.notes}</div>` : ''}
          </div>
        `;
      }).join('');

      card.innerHTML = `
        <div class="table-header">
          <span class="table-title">Table ${tableNum}</span>
          <span class="table-status">${orders.length} order${orders.length > 1 ? 's' : ''} · ${hasNew ? '🔴 Preparing' : '✅ Kitchen Done'}</span>
        </div>
        ${ordersHtml}
        <div class="table-total">
          <span class="total-label">Total to collect</span>
          <span class="total-amount">$${tableTotal.toFixed(2)}</span>
        </div>
        <div class="table-actions">
          <button class="print-btn" onclick="window.print()">🖨 Print Bill</button>
          <button class="clear-btn" onclick="window._clearTable('${tableNum}')">✓ Paid – Clear Table</button>
        </div>
      `;

      container.appendChild(card);
    });
  }

  function renderPaid(data) {
    const container = document.getElementById('paid-container');

    const cutoff = currentPaidFilter === 'today' ? startOfDay()
                 : currentPaidFilter === 'week' ? startOfWeek()
                 : 0;

    // Group cleared orders by table+paidAt session (group by paidAt within 1 min)
    const sessions = [];
    const seen = new Set();

    Object.entries(data)
      .filter(([, o]) => o.status === 'cleared' && (o.paidAt || 0) >= cutoff)
      .sort((a, b) => (a[1].paidAt || 0) - (b[1].paidAt || 0))
      .forEach(([id, order]) => {
        // Group orders with same table and paidAt within 60s together
        const existing = sessions.find(s =>
          s.table === String(order.table) &&
          Math.abs((s.paidAt || 0) - (order.paidAt || 0)) < 60000
        );
        if (existing) {
          existing.orders.push({ id, ...order });
          existing.total += order.total || 0;
        } else {
          sessions.push({
            table: String(order.table),
            paidAt: order.paidAt || 0,
            orders: [{ id, ...order }],
            total: order.total || 0,
          });
        }
      });

    sessions.sort((a, b) => b.paidAt - a.paidAt);

    if (sessions.length === 0) {
      container.innerHTML = '<div id="empty-paid-msg">No paid orders for this period</div>';
      return;
    }

    container.innerHTML = '';

    sessions.forEach(session => {
      const card = document.createElement('div');
      card.className = 'table-card';

      const ordersHtml = session.orders.map(order => {
        const itemsHtml = (order.items || []).map(item => `
          <div class="bill-item">
            <span class="bill-item-name">${item.name}</span>
            <span class="bill-item-qty">×${item.qty}</span>
            <span class="bill-item-price">$${(item.price * item.qty).toFixed(2)}</span>
          </div>
        `).join('');
        return `
          <div class="order-block">
            ${itemsHtml}
            ${order.notes ? `<div class="order-notes-line">📝 ${order.notes}</div>` : ''}
          </div>
        `;
      }).join('');

      card.innerHTML = `
        <div class="table-header paid-header">
          <span class="table-title">Table ${session.table}</span>
          <span class="paid-time">Paid · ${formatTime(session.paidAt)}</span>
        </div>
        ${ordersHtml}
        <div class="table-total paid-total">
          <span class="total-label">Total paid</span>
          <span class="total-amount">$${session.total.toFixed(2)}</span>
        </div>
      `;

      container.appendChild(card);
    });
  }
</script>
</body>
</html>
