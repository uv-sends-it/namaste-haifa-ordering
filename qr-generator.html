<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator – Namaste Haifa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { font-size: 1.3rem; color: #c0392b; margin-bottom: 8px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 16px; }

    .config { background: white; border-radius: 10px; padding: 16px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .config label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 4px; }
    .config input { border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 0.9rem; width: 340px; }
    .config button { background: #c0392b; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }

    #grid { display: grid; grid-template-columns: repeat(auto-fill, 200px); gap: 16px; }

    .qr-card { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .qr-card h3 { font-size: 1rem; color: #c0392b; margin-bottom: 4px; }
    .qr-card .section-label { font-size: 0.75rem; color: #888; margin-bottom: 10px; }
    .qr-card img { width: 160px; height: 160px; }

    .print-all { background: #e67e22; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-bottom: 20px; display: block; }

    @media print {
      .config, .print-all, h1, p { display: none; }
      #grid { gap: 10px; }
      .qr-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <h1>QR Code Generator – Namaste Haifa</h1>
  <p>Click Generate, then Print All.</p>

  <div class="config">
    <div>
      <label>Live site URL</label>
      <input type="text" id="base-url" value="https://uv-sends-it.github.io/namaste-haifa-ordering">
    </div>
    <button onclick="generate()">Generate QRs</button>
  </div>

  <button class="print-all" onclick="window.print()">🖨 Print All QR Codes</button>

  <div id="grid"></div>

  <script>
    const TABLES = ['S1','S2','S3','S4','S5','M1','M2','M3','M4','M5','W1','W2','W3','W4','W5'];
    const SECTION_NAMES = { S: 'Single', M: 'Middle', W: 'Wall' };

    // Minimal QR encoder — generates QR as SVG/data URL without external deps
    // Uses Google Charts API (works in any browser with internet)
    function qrUrl(text) {
      const encoded = encodeURIComponent(text);
      return `https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=4&data=${encoded}`;
    }

    function generate() {
      const baseUrl = document.getElementById('base-url').value.trim().replace(/\/$/, '');
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      TABLES.forEach(tableId => {
        const url = `${baseUrl}/index.html?table=${tableId}`;
        const section = SECTION_NAMES[tableId[0]] || '';

        const card = document.createElement('div');
        card.className = 'qr-card';

        const img = document.createElement('img');
        img.src = qrUrl(url);
        img.alt = `QR for ${tableId}`;

        card.innerHTML = `<h3>${tableId}</h3>`;
        card.appendChild(img);
        grid.appendChild(card);
      });
    }

    generate();
  </script>
</body>
</html>
